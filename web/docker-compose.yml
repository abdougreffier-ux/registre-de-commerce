version: '3.9'

services:

  # ─── PostgreSQL 15 ────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: registre_rc_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-registre_rc}
      POSTGRES_USER:     ${DB_USER:-registre_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-registre_pass_2024}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-registre_user} -d ${DB_NAME:-registre_rc}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - registre_net

  # ─── Django Backend ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend_django
      dockerfile: Dockerfile
    container_name: registre_rc_backend
    restart: unless-stopped
    environment:
      SECRET_KEY:    ${SECRET_KEY:-django-insecure-change-this-in-production-2024}
      DEBUG:         ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      DB_NAME:       ${DB_NAME:-registre_rc}
      DB_USER:       ${DB_USER:-registre_user}
      DB_PASSWORD:   ${DB_PASSWORD:-registre_pass_2024}
      DB_HOST:       db
      DB_PORT:       5432
      CORS_ALLOWED_ORIGINS:         ${CORS_ALLOWED_ORIGINS:-http://localhost,http://localhost:80,http://frontend}
      CSRF_TRUSTED_ORIGINS:         ${CSRF_TRUSTED_ORIGINS:-http://localhost,http://localhost:80}
      RCCM_VERIFICATION_BASE_URL:   ${RCCM_VERIFICATION_BASE_URL:-http://localhost}
    volumes:
      - media_files:/app/media
      - static_files:/app/staticfiles
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - registre_net
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn registre_rc.wsgi:application
               --bind 0.0.0.0:8000
               --workers 4
               --timeout 120
               --access-logfile -
               --error-logfile -"

  # ─── React Frontend (nginx) ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Laisser vide pour que le frontend utilise des URLs relatives (/api/…)
        # proxiées par nginx vers le service backend — comportement correct en Docker.
        # Surcharger uniquement si le frontend doit appeler un domaine externe distinct.
        REACT_APP_API_URL: ${REACT_APP_API_URL:-}
    container_name: registre_rc_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - registre_net

  # ─── pgAdmin (optional – remove in production) ────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: registre_rc_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    ${PGADMIN_EMAIL:-admin@registre.mr}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-Admin@2024!}
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - registre_net
    profiles:
      - tools

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  media_files:
    driver: local
  static_files:
    driver: local

# ─── Network ──────────────────────────────────────────────────────────────────
networks:
  registre_net:
    driver: bridge
