# ============================================================================
# NGINX — Configuration de référence pour le site institutionnel CCRCSM
# ----------------------------------------------------------------------------
# Ce fichier est fourni à titre d'exemple. Il implémente les exigences de
# sécurité (§10 TDR), de performance (§11 TDR) et de disponibilité (§11.4 TDR)
# du cahier des charges.
#
# À adapter : nom d'hôte réel, chemins, certificats, journalisation.
# ============================================================================

# Redirection HTTP -> HTTPS obligatoire (§10.3 TDR)
server {
    listen 80;
    listen [::]:80;
    server_name ccrcsm.gov.mr www.ccrcsm.gov.mr;

    location /.well-known/ {
        root /var/www/letsencrypt;
    }
    location / {
        return 301 https://www.ccrcsm.gov.mr$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.ccrcsm.gov.mr;

    root /var/www/ccrcsm/_site;
    index index.html;

    # --- TLS --------------------------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/ccrcsm.gov.mr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ccrcsm.gov.mr/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # --- En-têtes de sécurité (§10.2 TDR) --------------------------------
    # HSTS — à activer une fois HTTPS parfaitement fonctionnel
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # CSP stricte : le site ne charge que ses propres ressources
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; font-src 'self'; style-src 'self'; script-src 'self'; form-action 'self'; base-uri 'self'; frame-ancestors 'none'; upgrade-insecure-requests" always;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-site" always;

    # --- Compression (§11.1 TDR) -----------------------------------------
    gzip              on;
    gzip_vary         on;
    gzip_comp_level   6;
    gzip_types        text/plain text/css application/javascript application/json application/rss+xml application/atom+xml image/svg+xml application/xml+rss text/xml;
    gzip_min_length   256;

    # Brotli si le module est compilé
    # brotli on; brotli_types ...;

    # --- Caches longue durée pour les actifs versionnés ------------------
    location ~* \.(?:css|js|woff2?|ttf|otf|svg|png|jpg|jpeg|webp|avif|gif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # --- HTML : cache court + revalidation -------------------------------
    location ~* \.(?:html)$ {
        add_header Cache-Control "public, max-age=300, must-revalidate";
    }

    # --- Limitation anti-abus sur les formulaires ------------------------
    # (à combiner avec l'endpoint back-end qui traite /fr/saisine/ et /ar/saisine/)
    limit_req_zone $binary_remote_addr zone=forms:10m rate=5r/m;
    location ~ ^/(fr|ar)/saisine/$ {
        limit_req zone=forms burst=3 nodelay;
        # reverse-proxy vers l'application back-end de traitement des saisines
        # proxy_pass http://127.0.0.1:8080;
        try_files $uri =404;
    }

    # --- Pages d'erreur --------------------------------------------------
    error_page 404 /404.html;
    error_page 500 502 503 504 /404.html;

    # Masque les en-têtes inutilement bavards
    server_tokens off;

    # --- Journalisation --------------------------------------------------
    access_log /var/log/nginx/ccrcsm.access.log;
    error_log  /var/log/nginx/ccrcsm.error.log warn;
}
